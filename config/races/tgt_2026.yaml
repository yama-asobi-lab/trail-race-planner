race:
  name: "Tokyo Grand Trail 2026"
  distance_km: 160  # placeholder, update after loading GPX
  elevation_gain_m: 11000  # placeholder
  
  # File paths (relative to project root)
  gpx_file: "config/gpx_repo/tgt_2026_strava.gpx"
  output_file: "results/tgt_2026_segment_analysis.xlsx"
  
  # Analysis settings
  resample_m: 5  # Resample course to 5 m intervals
  elevation_tolerance_m: 50  # Tolerance for elevation validation

  # ITRA score reference points for this race.
  itra_reference_points:
    - reference_time: "29:52:00"
      reference_score: 750
      notes: "Estimated based on online tool for new (2026) course"

  # Optional planning assumptions (can be overridden via CLI)
  planning:
    fatigue_total_decay_pct: 14     # 14% linear decay from start to finish

  # Race start time for clock time calculations in reports (optional, defaults to 00:00:00)
  start_time: "15:50:00"


