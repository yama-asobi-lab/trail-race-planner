nutrition:
  target_carbs_g_per_h: 90
  food_catalog_file: "config/nutrition/foods.yaml"

  # Configuration defines WHAT will be used in each segment (and approximate proportion); planner computes HOW MUCH.
  # Ratio is a carb-share weight (not servings/units). Example ratio 1:2 means
  # one-third vs two-thirds of the carb target before unit/fraction rounding.
  segment_foods:
    default:
      - { food: "Pocari doble", ratio: 1 }
      - { food: "Self-made gel", ratio: 1.2 }
      - { food: "Youkan", ratio: 0.33 }

    # Optional overrides by arrival point name.
    by_segment:
      "A3 Sanogawa":
        - { food: "Pocari doble", ratio: 1 }
        - { food: "Self-made gel", ratio: 2 }
        - { food: "Hoshi imo", ratio: 1 }
      "Wada-toge":
        - { food: "Pocari doble", ratio: 1 }
        - { food: "Self-made gel", ratio: 2 }
        - { food: "Hoshi imo", ratio: 1 }

  # Aid-station intake (food with units).
  aid_station_intake:
    by_segment:
      "A1 Mitake Aid":
        - { food: "Banana", units: 0.5 }
        - { food: "Rice curry", carbs_g: 30}
      "Hinode Oguno 7-eleven":
        - { food: "Potato salad", carbs_g: 30 }
        - { food: "Coke", units: 1.0 }
      "A3 Sanogawa":
        - { food: "Hiyashi Ramen", carbs_g: 30 }
        - { food: "Coke", units: 0.5 }
      "A4 Fujimi chaya":
        - { food: "Somen", carbs_g: 30 }
      "Wada-toge":
        - { food: "Coke", units: 0.5 }
      "A6 Jurigi (2)":
        - { food: "Dashi chazuke", carbs_g: 30 }

  # Caffeine modeled with exact race-time doses (hours from start).
  caffeine_plan:
    ingestion_plan:
      - { time_h: 5.0, dose_mg: 200 }
      - { time_h: 8.0, dose_mg: 200 }
      - { time_h: 13.0, dose_mg: 200 }
      - { time_h: 22.0, dose_mg: 200 }
      - { time_h: 27.0, dose_mg: 200 }
