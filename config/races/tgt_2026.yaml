race:
  name: "Tokyo Grand Trail 2026"
  distance_km: 160  # placeholder, update after loading GPX
  elevation_gain_m: 11000  # placeholder
  
  # File paths (relative to project root)
  gpx_file: "config/gpx_repo/TGT_2025.gpx"
  output_file: "results/tgt_2026_segment_analysis.xlsx"
  
  # Analysis settings
  resample_m: 10  # Resample course to 10m intervals
  elevation_tolerance_m: 50  # Tolerance for elevation validation


aid_stations:
