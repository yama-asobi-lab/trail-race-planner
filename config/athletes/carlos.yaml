athlete:
  name: "Carlos"

  # ITRA performance index
  itra_points: 720

  # Reference flat performance used for Riegel's formula.
  # Should be a road/flat race result (half marathon, marathon, etc.).
  # The pace calculator uses this to derive the baseline flat pace for the course.
  reference_performance:
    distance_km: 42.195
    time: "2:50:00"
    notes: "Road marathon PB"

  # Grade Adjusted Pace (GAP) correction curve.
  # Format: list of [grade_decimal, correction_factor] pairs.
  #   grade_decimal  : slope as rise/run decimal (e.g. 0.10 = 10% uphill, -0.06 = 6% downhill)
  #   correction_factor: pace multiplier relative to flat pace (>1 = slower, <1 = faster)
  # Leave 'points' empty ([]) to use the built-in default trail-running table.
  gap_curve:
    points: 
      - [ 0.01, 1.075 ]  # +1 %: 7.5 % slower (linear extrapolation above this)
      - [ 0.00, 1.00  ]  # flat
      - [-0.01, 0.965 ]  # −1 %: 3.5 % faster
      - [-0.06, 0.8   ]  # −6 %: 20 % faster (optimal descent)
      - [-0.07, 0.865 ]  # −7 %: braking effect starts

  preferences:
    threshold_flat_pace_per_km: "3:50/km"  # LT2
    aerobic_threshold_flat_pace_per_km: "4:40/km"  # LT1
