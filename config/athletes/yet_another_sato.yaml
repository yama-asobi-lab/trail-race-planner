athlete:
  name: "Yet Another Sato"  # Reference baseline athlete
  weight_kg: 60

  # ITRA performance index (used by ItraScorePredictor)
  itra_points: 500

  # Reference flat performance used for Riegel's formula.
  reference_performance:
    distance_km: 42.195
    time: "4:00:00"
    notes: "Road marathon equivalent"

  # Grade Adjusted Pace (GAP) correction curve.
  # Leave 'points' empty ([]) to use the built-in default trail-running table.
  # See carlos.yaml for full documentation of the default table.
  gap_curve:
    points: []

  preferences:
    target_finish_time: null
